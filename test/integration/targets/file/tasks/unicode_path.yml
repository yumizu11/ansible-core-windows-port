- name: create local file with unicode filename and content
  lineinfile:
    dest: "{{ remote_tmp_dir_test }}/иҜӯ/жұүиҜӯ.txt"
    create: true
    line: жұүиҜӯ

- name: remove local file with unicode filename and content
  file:
    path: "{{ remote_tmp_dir_test }}/иҜӯ/жұүиҜӯ.txt"
    state: absent
