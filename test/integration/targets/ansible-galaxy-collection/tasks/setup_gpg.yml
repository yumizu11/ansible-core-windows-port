- name: create empty gpg homedir
  file:
    state: "{{ item }}"
    path: "{{ gpg_homedir }}"
    mode: 0700
  loop:
    - absent
    - directory

- when: ansible_facts.distribution == 'MacOSX'
  block:
    - name: MACOS | Find brew binary
      command: which brew
      register: brew_which

    - name: MACOS | Get owner of brew binary
      stat:
        path: >-
          {{ brew_which.stdout }}
      register: brew_stat

    - command: brew install gpg
      become: yes
      become_user: >-
        {{ brew_stat.stat.pw_name }}
      environment:
        HOMEBREW_NO_AUTO_UPDATE: True
      notify:
        - uninstall gpg

- name: get username for generating key
  command: whoami
  register: user

- name: import public key
  command:
    cmd: gpg --no-tty --homedir {{ gpg_homedir }} --import
    stdin: '{{ pulp_published_repo.gpgkey }}'
  register: gpg_import

- command: gpg --no-tty --homedir {{ gpg_homedir }} --list-keys {{ keyid }}
  vars:
    keyid: "{{ (gpg_import.stderr_lines | select('match', 'gpg: key ') | first | split).2 | replace(':', '') }}"
  register: gpg_list_keys

- name: save gpg user and fingerprint of new key
  set_fact:
    gpg_user: ansible-test
    fingerprint: "{{ gpg_list_keys.stdout_lines[1] | trim }}"
