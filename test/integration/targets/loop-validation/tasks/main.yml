  ignore_errors: yes
  register: result

- assert:
    that: |
      result.msg == "Error processing keyword 'extended_allitems': The value 'not-a-bool' could not be converted to 'bool'."

- name: Invalid loop_control.break_when value
  debug:
  loop: [1]
  loop_control:
    break_when:
      nope: sorry
  ignore_errors: yes
  register: result

- assert:
    that:
      - result.msg == "One or more items failed"
      - result is failed
      - result.results[0].break_when_result == "Conditional expressions must be strings."
      - result.results[0].msg == "Hello world!"
      - result.results[0] is failed
