---
# Manage a remote Windows host over WinRM or PSRP from a Windows controller.
#   $env:WIN_PW = "..."
#   ansible-playbook -i examples/inventory_winrm.yml examples/play_windows.yml
#   ansible-playbook -i examples/inventory_psrp.yml  examples/play_windows.yml
- name: Remote Windows over WinRM/PSRP
  hosts: windows
  gather_facts: true
  tasks:
    - name: Ping
      ansible.windows.win_ping:

    - name: Who am I
      ansible.windows.win_command: whoami
      register: who

    - name: Show identity + OS
      ansible.builtin.debug:
        msg: >-
          user={{ who.stdout | trim }}
          os={{ ansible_facts.os_name | default(ansible_facts.distribution | default('?')) }}
          hostname={{ ansible_facts.hostname | default('?') }}

    - name: Copy a file
      ansible.windows.win_copy:
        content: "managed from a Windows controller over {{ ansible_connection }}\n"
        dest: C:\Windows\Temp\ansible_example.txt

    - name: Cleanup
      ansible.windows.win_file:
        path: C:\Windows\Temp\ansible_example.txt
        state: absent
