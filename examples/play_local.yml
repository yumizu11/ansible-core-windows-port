---
# Manage the local Windows host with PowerShell modules.
#   ansible-galaxy collection install ansible.windows
#   ansible-playbook -i "localhost," -c local examples/play_local.yml
- name: Local Windows host (connection=local)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Ping
      ansible.windows.win_ping:

    - name: Who am I
      ansible.windows.win_command: whoami
      register: who

    - name: PowerShell version
      ansible.windows.win_shell: $PSVersionTable.PSVersion.ToString()
      register: psver

    - name: Show
      ansible.builtin.debug:
        msg: "user={{ who.stdout | trim }} powershell={{ psver.stdout | trim }}"

    - name: Create then remove a temp file (idempotent copy)
      ansible.windows.win_copy:
        content: "hello from a native Windows ansible controller\n"
        dest: C:\Windows\Temp\ansible_example.txt

    - name: Cleanup
      ansible.windows.win_file:
        path: C:\Windows\Temp\ansible_example.txt
        state: absent
