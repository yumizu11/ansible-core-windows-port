---
# Manage a remote Linux host over SSH from a Windows controller.
#   $env:ANSIBLE_HOST_KEY_CHECKING = "False"
#   ansible-playbook -i examples/inventory_ssh.yml examples/play_linux.yml
- name: Remote Linux over SSH
  hosts: linux
  gather_facts: true
  tasks:
    - name: Ping (python module over ssh)
      ansible.builtin.ping:

    - name: Show a few facts
      ansible.builtin.debug:
        msg: "{{ ansible_distribution }} {{ ansible_distribution_version }} | python {{ ansible_python_version }}"

    - name: Copy a file (sftp/scp via Windows OpenSSH)
      ansible.builtin.copy:
        content: "managed from a Windows controller\n"
        dest: /tmp/ansible_example.txt

    - name: Run a command as root (passwordless sudo)
      ansible.builtin.command: id
      become: true
      register: rootid
      changed_when: false

    - name: Show
      ansible.builtin.debug:
        msg: "{{ rootid.stdout }}"

    - name: Cleanup
      ansible.builtin.file:
        path: /tmp/ansible_example.txt
        state: absent
